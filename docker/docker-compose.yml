version: "3.9"

services:

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: mh_backend
    ports:
      - "8000:8000"
      - "8001:8001"    # Prometheus metrics
    environment:
      - DEBUG=false
      - LOG_LEVEL=INFO
      - ENABLE_METRICS=true
    volumes:
      - chroma_data:/app/chroma_db
      - app_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: mh_frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:
  app_logs: